version: "3.9"
services:

    # Laravel App
    laravel:
        build:
            context: ./vendor/laravel/sail/runtimes/8.3
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.3/app'
        container_name: laravel-app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'

        volumes:
            - .:/var/www/html
        networks:
            - phpLocalNetwork

    # Redis Service
    redis:
        image: redis:alpine
        container_name: redis
        ports:
            - 6379:6379
        networks:
            - phpLocalNetwork

    # mariadb server
    mariadb:
        image: mariadb
        volumes:
            # map volumes set database local
            - ./databasefiles:/var/lib/mysql
        environment:
            # database en root password
            MYSQL_ROOT_PASSWORD: a3b6c9
            #MYSQL_DATABASE: testdatabase
        ports:
            - 3306:3306
        networks:
            - phpLocalNetwork
    # phpmyadmin
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        links:
            - mariadb:db
        ports:
            - 8080:80
        networks:
            - phpLocalNetwork
networks:
    phpLocalNetwork:
